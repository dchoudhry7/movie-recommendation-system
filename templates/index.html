<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .hero {
            padding: 80px 0;
            text-align: center;
        }

        .movie-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
            min-width: 220px;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .scroll-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .scroll-container::-webkit-scrollbar {
            height: 6px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1 class="display-5 fw-bold">
                🎬 Movie Recommendation System
            </h1>
            <p class="fs-5 text-light">
                Find movies similar to your favorite ones
            </p>
            <form method="POST">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <select class="form-select form-select-lg" name="movie">
                            {% for movie in movies %}
                                <option value="{{movie}}" {% if movie == selected_movie %}selected{% endif %}>
                                    {{movie}}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <button class="btn btn-danger btn-lg mt-3">
                    Recommend
                </button>
            </form>
        </div>

        {% if recommendations %}
            <div class="mt-5">
                <h3 class="mb-4">
                    Movies Similar to "{{selected_movie}}"
                </h3>
                <div class="scroll-container">
                    {% for movie in recommendations %}
                        <div class="movie-card text-center">
                            <h5>{{movie}}</h5>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endif %}
    </div>
</body>

</html>
